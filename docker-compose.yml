version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: lumen
      POSTGRES_PASSWORD: lumenpassword
      POSTGRES_DB: lumendb
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data:
